version: "3.9"

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  saas_net:
    driver: bridge

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:   # persists DB data between `docker compose down` / `up` cycles
  pgadmin_data:    # persists pgAdmin login / saved connections

# ─── Services ─────────────────────────────────────────────────────────────────
services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks: [saas_net]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB:       saas_reviews
      POSTGRES_USER:     saas_user
      POSTGRES_PASSWORD: saas_password   # override via .env in production
    ports:
      - "5432:5432"   # expose locally so you can connect with Prisma Studio
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saas_user -d saas_reviews"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Prisma migrations (one-shot init container) ──────────────────────────────
  # Runs `prisma migrate deploy` once on startup, then exits.
  # This ensures the schema is always up-to-date before the app starts.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder          # use the builder stage which has prisma CLI
      args:
        DATABASE_URL: postgresql://saas_user:saas_password@postgres:5432/saas_reviews
    command: npx prisma migrate deploy
    networks: [saas_net]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://saas_user:saas_password@postgres:5432/saas_reviews
    restart: "no"              # run once and exit

  # ── Next.js app ─────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Public vars baked into the JS bundle at build time
        NEXT_PUBLIC_SITE_URL:         ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
        NEXT_PUBLIC_SITE_NAME:        ${NEXT_PUBLIC_SITE_NAME:-SaaS Reviews}
        NEXT_PUBLIC_GA_ID:            ${NEXT_PUBLIC_GA_ID:-}
        NEXT_PUBLIC_PLAUSIBLE_DOMAIN: ${NEXT_PUBLIC_PLAUSIBLE_DOMAIN:-}
        # Needed at build time if generateStaticParams queries the DB
        DATABASE_URL: postgresql://saas_user:saas_password@postgres:5432/saas_reviews
    restart: unless-stopped
    networks: [saas_net]
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    environment:
      # ── Database ────────────────────────────────────────────────────────────
      DATABASE_URL: postgresql://saas_user:saas_password@postgres:5432/saas_reviews

      # ── Anthropic ───────────────────────────────────────────────────────────
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}

      # ── Site identity ────────────────────────────────────────────────────────
      NEXT_PUBLIC_SITE_URL:         ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      NEXT_PUBLIC_SITE_NAME:        ${NEXT_PUBLIC_SITE_NAME:-SaaS Reviews}

      # ── Analytics ───────────────────────────────────────────────────────────
      NEXT_PUBLIC_GA_ID:            ${NEXT_PUBLIC_GA_ID:-}
      NEXT_PUBLIC_PLAUSIBLE_DOMAIN: ${NEXT_PUBLIC_PLAUSIBLE_DOMAIN:-}

      # ── Affiliate & tracking ─────────────────────────────────────────────────
      AFFILIATE_SECRET:  ${AFFILIATE_SECRET}
      CLICK_IP_SALT:     ${CLICK_IP_SALT}

      # ── On-demand ISR revalidation ────────────────────────────────────────────
      REVALIDATION_SECRET: ${REVALIDATION_SECRET}

      NODE_ENV: production
    env_file:
      - .env          # fallback — values above take precedence over .env

  # ── pgAdmin (optional, dev convenience) ─────────────────────────────────────
  # Access at http://localhost:5050
  # Default login: admin@saasreviews.local / admin
  # Remove this service before deploying to production.
  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    networks: [saas_net]
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@saasreviews.local
      PGADMIN_DEFAULT_PASSWORD: admin
    profiles:
      - tools   # only starts with: docker compose --profile tools up
